<div class="players-view">
  <div class="toolbar">
    <input
      type="file"
      accept=".csv"
      #fileInput
      (change)="onFileSelected($event)"
      style="display: none"
    />
    <button class="import-btn" (click)="fileInput.click()">
      Importer un fichier CSV
    </button>
    @if (players().length > 0) {
      <button class="export-btn" (click)="exportCsv()">
        Exporter en CSV
      </button>
    }
  </div>

  @if (players().length > 0) {
    <table class="players-table">
      <thead>
        <tr>
          <th class="col-select">
            <input
              type="checkbox"
              [checked]="allSelected()"
              [indeterminate]="someSelected()"
              (change)="toggleAll()"
            />
          </th>
          <th>Nom</th>
          <th>Genre</th>
          <th>Note globale</th>
          <th>Attaque</th>
          <th>Passe</th>
          <th>Défense</th>
        </tr>
      </thead>
      <tbody>
        @for (player of players(); track player.name) {
          <tr [class.selected]="selectedPlayerIds().has(player.id)" (click)="toggleSelection(player.id)">
            <td class="col-select">
              <input
                type="checkbox"
                [checked]="selectedPlayerIds().has(player.id)"
                (click)="$event.stopPropagation()"
                (change)="toggleSelection(player.id)"
              />
            </td>
            <td>{{ player.name }}</td>
            <td>{{ player.gender }}</td>
            <td class="col-stat">
              <input type="number" min="1" max="10" [value]="player.global_impact"
                (click)="$event.stopPropagation()"
                (change)="updateStat(player.id, 'global_impact', $event)" />
            </td>
            <td class="col-stat">
              <input type="number" min="1" max="10" [value]="player.attack"
                (click)="$event.stopPropagation()"
                (change)="updateStat(player.id, 'attack', $event)" />
            </td>
            <td class="col-stat">
              <input type="number" min="1" max="10" [value]="player.set"
                (click)="$event.stopPropagation()"
                (change)="updateStat(player.id, 'set', $event)" />
            </td>
            <td class="col-stat">
              <input type="number" min="1" max="10" [value]="player.defense"
                (click)="$event.stopPropagation()"
                (change)="updateStat(player.id, 'defense', $event)" />
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>

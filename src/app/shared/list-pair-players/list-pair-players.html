<div class="pair-list">
  <div class="pair-adder">
    <input
      class="player-input"
      [attr.list]="'players-datalist-' + instanceId + '-1'"
      [(ngModel)]="searchName1"
      (ngModelChange)="onName1Change($event)"
      placeholder="Joueur 1…"
    />
    <datalist [id]="'players-datalist-' + instanceId + '-1'">
      @for (player of players(); track player.id) {
        <option [value]="player.name"></option>
      }
    </datalist>

    <input
      class="player-input"
      [attr.list]="'players-datalist-' + instanceId + '-2'"
      [(ngModel)]="searchName2"
      (ngModelChange)="onName2Change($event)"
      placeholder="Joueur 2…"
    />
    <datalist [id]="'players-datalist-' + instanceId + '-2'">
      @for (player of players(); track player.id) {
        <option [value]="player.name"></option>
      }
    </datalist>

    <button class="add-pair-btn"
      (click)="addPair()"
      [disabled]="newId1 === null || newId2 === null || newId1 === newId2"
    >
      + Ajouter
    </button>
  </div>

  @if (pairs().length > 0) {
    <ul class="pairs">
      @for (pair of pairs(); track $index) {
        <li class="pair-item">
          <span class="pair-players">
            {{ playerName(pair.player1Id) }} — {{ playerName(pair.player2Id) }}
          </span>
          <button class="remove-btn" title="Supprimer" (click)="removePair($index)">✕</button>
        </li>
      }
    </ul>
  } @else {
    <p class="empty-hint">Aucune paire définie.</p>
  }
</div>
